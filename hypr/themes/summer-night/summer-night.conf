source = ~/.config/hypr/colors/everforest-light.conf

# Apply themes
# exec = sh .config/hypr/scripts/switch-theme.sh summer-night

general {
    gaps_in = 8
    gaps_out = 15

    border_size = 2
    col.active_border = $fg
    col.inactive_border = $bg5

    col.nogroup_border = $fg
    col.nogroup_border_active = $bg5

    resize_on_border = true
}

decoration {
    rounding = 10

    blur {
        enabled = true
        size = 3
        passes = 1
        new_optimizations = on
        xray = true
        ignore_opacity = true
    }

    # inactive_opacity = 0.93
    
    drop_shadow = yes
    shadow_range = 0
    shadow_render_power = 1
    col.shadow = 0xff56635f
    col.shadow_inactive = rgb(2b312f)
    shadow_scale = 1.0
    shadow_offset = 0 4

    dim_inactive = true
    dim_strength = 0.15

    dim_around = 0.0

    # multisample_edges = true TODO
}

animations {
    enabled = yes

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    bezier = myBezier2, 0.65, 0, 0.35, 1
    bezier = linear, 0, 0, 1, 1

    bezier=slow,0,0.85,0.3,1
    bezier=overshot,0.7,0.6,0.1,1.1
    bezier=bounce,1,1.6,0.1,0.85
    bezier=slingshot,1,-1,0.15,1.25
    bezier=nice,0,6.9,0.5,-4.20
	
    animation = windows,1,5,bounce,popin
    animation = border,1,20,default
    animation = fade, 1, 5, overshot
    animation = workspaces, 1, 3, overshot #, slidevert
    animation = windowsIn,1,5,slow,popin
    animation = windowsMove,1,5,default
}


